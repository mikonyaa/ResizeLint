<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title description">
  <title id="title">ResizeLint terminal report</title>
  <desc id="description">A terminal shows an RL001 finding for UIScreen main bounds and a concise analysis summary.</desc>
  <defs>
    <linearGradient id="frame" x1="90" y1="40" x2="1120" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182231"/>
      <stop offset="1" stop-color="#080B10"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#000" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#EEF3F8"/>
  <rect x="58" y="46" width="1084" height="668" rx="28" fill="url(#frame)" filter="url(#shadow)"/>
  <rect x="58" y="46" width="1084" height="66" rx="28" fill="#202C3C"/>
  <rect x="58" y="86" width="1084" height="26" fill="#202C3C"/>
  <circle cx="96" cy="79" r="8" fill="#FF7A77"/>
  <circle cx="124" cy="79" r="8" fill="#FFBF63"/>
  <circle cx="152" cy="79" r="8" fill="#69D997"/>
  <text x="600" y="86" text-anchor="middle" fill="#AEBCCB" font-family="Instrument Sans, sans-serif" font-size="17">ResizeLint — project</text>

  <g font-family="Red Hat Mono, monospace" font-size="20">
    <text x="104" y="164" fill="#8CF3D1">$</text>
    <text x="134" y="164" fill="#F5F7FA">resizelint lint .</text>

    <text x="104" y="228" fill="#B8C5D4">Sources/GalleryView.swift:42:21</text>
    <text x="506" y="228" fill="#FF8D88">error</text>
    <text x="590" y="228" fill="#8CC7FF">RL001</text>

    <text x="104" y="278" fill="#F5F7FA">UIScreen.main bounds do not describe the current scene's</text>
    <text x="104" y="312" fill="#F5F7FA">available space; use view bounds or scene-local geometry.</text>

    <text x="104" y="412" fill="#699ED1">github.com/mikonyaa/ResizeLint/blob/v1/Docs/Rules/RL001.md</text>

    <path d="M104 492H1096" stroke="#D8E4F2" stroke-opacity=".14"/>
    <text x="104" y="550" fill="#FF8D88">1 error</text>
    <text x="224" y="550" fill="#8CF3D1">18 files</text>
    <text x="350" y="550" fill="#B8C5D4">analyzed in 0.34s</text>

    <text x="104" y="648" fill="#8CF3D1">$</text>
    <rect x="134" y="625" width="12" height="27" rx="2" fill="#F5F7FA" opacity=".88"/>
  </g>
</svg>
