<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">ResizeLint social preview</title>
  <desc id="description">Adaptive window frames and deterministic diagnostic markers beside the ResizeLint name.</desc>
  <defs>
    <linearGradient id="background" x1="80" y1="40" x2="1180" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111824"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <linearGradient id="signal" x1="112" y1="92" x2="646" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#52A7FF"/>
      <stop offset="1" stop-color="#8CF3D1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(326 306) rotate(42) scale(480 420)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#52A7FF" stop-opacity=".18"/>
      <stop offset="1" stop-color="#52A7FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#D8E4F2" stroke-opacity=".055"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="30" fill="url(#background)"/>
  <rect width="1280" height="640" rx="30" fill="url(#grid)"/>
  <rect width="820" height="640" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="92" y="88" width="522" height="452" rx="46" fill="#0C1017" stroke="#D8E4F2" stroke-opacity=".13" stroke-width="2"/>
    <rect x="148" y="144" width="410" height="340" rx="34" fill="none" stroke="url(#signal)" stroke-width="8"/>
    <rect x="209" y="204" width="288" height="220" rx="25" fill="#101A27" stroke="#D8E4F2" stroke-opacity=".18" stroke-width="2"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M112 158v-32c0-10 8-18 18-18h34M542 520h34c10 0 18-8 18-18v-32" stroke="url(#signal)" stroke-width="7"/>
    <path d="M148 236v-58c0-19 15-34 34-34h60M558 392v58c0 19-15 34-34 34h-60" stroke="#F5F7FA" stroke-opacity=".92" stroke-width="5"/>
  </g>

  <g font-family="Red Hat Mono, monospace" font-size="18" letter-spacing="2">
    <text x="232" y="254" fill="#8CF3D1">RL001</text>
    <text x="232" y="289" fill="#F5F7FA" opacity=".82">LOCAL GEOMETRY</text>
    <path d="M232 322h210" stroke="#52A7FF" stroke-width="3"/>
    <path d="M232 348h152" stroke="#D8E4F2" stroke-opacity=".24" stroke-width="3"/>
    <path d="M232 374h184" stroke="#D8E4F2" stroke-opacity=".14" stroke-width="3"/>
    <circle cx="472" cy="236" r="6" fill="#FFB86C"/>
  </g>

  <g transform="translate(700 0)">
    <text x="0" y="246" fill="#8CF3D1" font-family="Red Hat Mono, monospace" font-size="18" font-weight="700" letter-spacing="4">DETERMINISTIC • LOCAL • FAST</text>
    <text x="0" y="334" fill="#F5F7FA" font-family="Instrument Sans, sans-serif" font-size="74" font-weight="700" letter-spacing="-3">ResizeLint</text>
    <text x="2" y="388" fill="#B8C5D4" font-family="Instrument Sans, sans-serif" font-size="25" letter-spacing=".3">Static analysis for every window size.</text>
    <g transform="translate(2 446)" font-family="Red Hat Mono, monospace" font-size="16" letter-spacing="1.5">
      <rect width="198" height="44" rx="22" fill="#52A7FF" fill-opacity=".12" stroke="#52A7FF" stroke-opacity=".42"/>
      <text x="24" y="28" fill="#8CC7FF">SWIFT • UIKIT</text>
      <rect x="216" width="146" height="44" rx="22" fill="#8CF3D1" fill-opacity=".10" stroke="#8CF3D1" stroke-opacity=".35"/>
      <text x="240" y="28" fill="#8CF3D1">CI READY</text>
    </g>
  </g>
</svg>
