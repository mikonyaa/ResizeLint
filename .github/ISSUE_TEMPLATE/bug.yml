name: Bug report
description: Report a reproducible crash or incorrect behavior.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve ResizeLint. Remove private source and paths from examples.
  - type: input
    id: version
    attributes:
      label: ResizeLint version
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS arm64
        - macOS x86_64
        - Ubuntu x86_64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the exact command and a minimized public fixture.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
