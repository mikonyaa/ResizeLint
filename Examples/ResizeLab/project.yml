name: ResizeLab

options:
  bundleIdPrefix: io.github.mikonyaa
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    CODE_SIGNING_ALLOWED: NO

targets:
  ResizeLab:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Supporting/Info.plist
      properties:
        CFBundleDisplayName: ResizeLab
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.mikonyaa.ResizeLab
        PRODUCT_NAME: ResizeLab
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ResizeLabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: ResizeLab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.mikonyaa.ResizeLabTests

  ResizeLabUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: ResizeLab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.mikonyaa.ResizeLabUITests
        TEST_TARGET_NAME: ResizeLab

schemes:
  ResizeLab:
    build:
      targets:
        ResizeLab: all
        ResizeLabTests: [test]
    test:
      targets:
        - ResizeLabTests
        - ResizeLabUITests
